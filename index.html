<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSI April 2026 Online Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#0056b3; 
  --secondary:#ff4500; 
  --success:#22c55e; 
  --danger:#ef4444;
  --bg:#ffffff; 
  --glass:rgba(0, 86, 179, 0.03); 
  --border:rgba(0, 86, 179, 0.12);
}
*{box-sizing:border-box;}
body{margin:0; font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:#1a1a1a; padding:40px 15px;}
.container{max-width:800px; margin:auto; padding:50px; border-radius:28px; background:var(--glass); backdrop-filter:blur(25px); border:1px solid var(--border); box-shadow:0 30px 70px rgba(0,0,0,0.05);}
h1{font-size:2.6rem; margin-bottom:12px; background:linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent;}
.description{color:#444; margin-bottom:40px; border-bottom:1px solid var(--border); padding-bottom:25px; font-weight: 500;}
section{margin-bottom:40px;}
h3{font-size:0.85rem; text-transform:uppercase; letter-spacing:2px; color:var(--primary); margin-bottom:20px; font-weight: 700;}
.form-group{margin-bottom:22px;}
label{display:block; font-size:0.85rem; margin-bottom:8px; color:#1a1a1a; font-weight: 600;}
input,select,textarea{width:100%; padding:15px; border-radius:14px; border:1px solid var(--border); background:rgba(255,255,255,0.8); color:#1a1a1a; font-size:0.95rem; transition:0.3s;}
input:focus,select:focus,textarea:focus{outline:none; border-color:var(--primary); background:#fff; box-shadow: 0 0 0 4px rgba(0, 86, 179, 0.1);}
.error{font-size:0.75rem; color:var(--danger); margin-top:6px; display:none;}
.radio-option{display:flex; align-items:center; gap:12px; padding:14px; background:rgba(0, 86, 179, 0.05); border-radius:12px; margin-bottom: 10px;}
.radio-option span{color:#1a1a1a; font-size: 0.9rem;}
.info-tag{display:inline-block; background:var(--primary); color:white; padding:4px 12px; border-radius:20px; font-size:0.75rem; margin-bottom:15px; text-transform:uppercase; font-weight:700;}
button{width:100%; padding:18px; border:none; border-radius:16px; font-size:1.05rem; font-weight:700; background:linear-gradient(90deg,var(--primary),var(--secondary)); color:white; cursor:pointer;}
.loader{display:none; border:3px solid #fff; border-top:3px solid transparent; border-radius:50%; width:22px; height:22px; margin:auto; animation:spin 1s linear infinite;}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
#success{display:none; text-align:center;}
.success-icon{width:80px;height:80px;margin:auto;}
</style>
</head>

<body>

<div class="container">

<form id="mainForm">

<input name="parentName" placeholder="Parent Name" required>
<input name="email" type="email" placeholder="Email" required>
<input name="phone" placeholder="Phone" required>
<input name="studentName" placeholder="Student Name" required>

<select name="ageGroup" required>
<option value="">Age Group</option>
<option>Ages 5-7</option>
<option>Ages 8-12</option>
<option>Ages 13+</option>
</select>

<select name="referralSource" required>
<option value="">Referral</option>
<option>WhatsApp</option>
<option>Social Media</option>
<option>Friend</option>
<option>Poster</option>
<option>Other</option>
</select>

<select name="courseSelection" required>
<option value="">Course</option>
<option value="Robotics">Robotics</option>
<option value="Web Development">Web Development</option>
</select>

<select name="intakeLevel" required>
<option value="">Level</option>
<option value="Level 1">Level 1</option>
<option value="Level 2">Level 2</option>
<option value="Level 3">Level 3</option>
</select>

<label>
<input type="checkbox" id="confirmCheck" name="commitment" value="Confirmed" required>
Confirm readiness
</label>

<button type="submit" id="submitBtn">Submit</button>

</form>

<div id="success">
<div class="success-icon">
<svg viewBox="0 0 52 52">
<circle cx="26" cy="26" r="25" fill="none" stroke="#22c55e" stroke-width="3"/>
<path fill="none" stroke="#22c55e" stroke-width="4" d="M14 27l7 7 17-17"/>
</svg>
</div>
<h2>Submitted Successfully</h2>
</div>

</div>

<script>
const form = document.getElementById("mainForm");
const success = document.getElementById("success");

form.addEventListener("submit", function(e){
  e.preventDefault();

  const scriptURL = "https://script.google.com/macros/s/YOUR_NEW_DEPLOYMENT_URL/exec";

  const formData = new FormData(form);

  const iframe = document.createElement("iframe");
  iframe.name = "hidden_iframe";
  iframe.style.display = "none";
  document.body.appendChild(iframe);

  const tempForm = document.createElement("form");
  tempForm.method = "POST";
  tempForm.action = scriptURL;
  tempForm.target = "hidden_iframe";

  for (let pair of formData.entries()) {
    const input = document.createElement("input");
    input.type = "hidden";
    input.name = pair[0];
    input.value = pair[1];
    tempForm.appendChild(input);
  }

  document.body.appendChild(tempForm);
  tempForm.submit();

  setTimeout(()=>{
    form.style.display="none";
    success.style.display="block";
  },1500);
});
</script>

</body>
</html>
